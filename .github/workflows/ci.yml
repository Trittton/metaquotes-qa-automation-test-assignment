name: API Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: grep -v 'pywin32\|pywinauto' requirements.txt | pip install -r /dev/stdin

      - name: Run API tests
        env:
          PETSTORE_BASE_URL: https://petstore.swagger.io/v2
          REQUEST_TIMEOUT_SECONDS: 10
        run: |
          mkdir -p reports
          pytest tests/api/ -m api -v --html=reports/report.html --self-contained-html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/report.html
          retention-days: 7

# GUI tests require a Windows machine with mstsc.exe.
# They are auto-skipped on Linux by the platform guard in conftest.py.
# To run locally: pytest tests/gui/ -m gui -v

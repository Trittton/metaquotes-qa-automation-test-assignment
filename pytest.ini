[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -v

timeout = 30

markers =
    api: API integration tests (Petstore POST /pet/{petId})
    gui: GUI automation tests — Windows only (mstsc.exe)
    smoke: Critical happy-path subset; run first
    negative: Tests validating error handling and rejection

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
